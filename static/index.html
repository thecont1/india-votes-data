<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECI Live Election Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #2a2a2a;
    --card: #363636;
    --border: #4a4a4a;
    --text: #f0f0f0;
    --muted: #999999;
    --accent: #ffffff;
    --red: #f87171;
    --green: #4ade80;
    --yellow: #facc15;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: #1a1a1a;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header h1 .emoji { font-size: 32px; margin-right: 8px; }
  .header .meta {
    display: flex;
    align-items: center;
    gap: 16px;
    color: var(--muted);
    font-size: 14px;
  }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
    animation: pulse 2s ease-in-out infinite;
  }
  .status-dot.live { background: var(--green); }
  .status-dot.idle { background: var(--yellow); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* State selector */
  .state-bar {
    padding: 12px 32px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .state-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .state-btn:hover { border-color: #ffffff; color: var(--text); }
  .state-btn.active {
    background: #ffffff;
    color: #1a1a1a;
    border-color: #ffffff;
    font-weight: 600;
  }

  /* Main content */
  .content {
    padding: 24px 32px;
    margin: 0 auto;
  }
  @media (min-width: 769px) {
    .content { max-width: 65vw; }
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
  }

  .card h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Toggle switch */
  .toggle-group {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .toggle-btn {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 7px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .toggle-btn:not(:last-child) { border-right: 1px solid var(--border); }
  .toggle-btn:hover { color: var(--text); }
  .toggle-btn.active {
    background: #ffffff;
    color: #1a1a1a;
    font-weight: 600;
  }

  /* Chart */
  .chart-container {
    position: relative;
    width: 100%;
    height: 500px;
  }

  /* Status bar */
  .status-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--muted);
  }
  .status-bar .live-count { color: var(--green); font-weight: 600; }
  .status-bar .declared-count { color: var(--accent); font-weight: 600; }

  /* Legend — circle style: transparent fill, colored border */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-swatch {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: transparent;
    border: 2px solid;
    flex-shrink: 0;
  }
  /* Seat tally: declared/leading swatches (non-circle) */
  .legend-swatch.declared {
    background: var(--muted);
    border-color: var(--muted);
  }
  .legend-swatch.leading {
    background: repeating-linear-gradient(
      -45deg, var(--muted), var(--muted) 3px,
      transparent 3px, transparent 6px
    );
    border-color: var(--muted);
    border-radius: 3px;
    width: 20px; height: 12px;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 20px; color: var(--text); margin-bottom: 8px; }

  /* Responsive */
  @media (max-width: 768px) {
    .header { padding: 16px; }
    .header h1 { font-size: 20px; }
    .content { padding: 16px; }
    .chart-container { height: 400px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span class="emoji">🗳️</span>ECI Live Election Tracker</h1>
  <div class="meta">
    <span id="date-display"></span>
    <span>
      <span class="status-dot idle" id="status-dot"></span>
      <span id="status-text">Waiting for data...</span>
    </span>
  </div>
</div>

<div class="state-bar" id="state-bar"></div>

<div class="content">
  <div class="status-bar" id="status-bar">
    <span>Loading...</span>
  </div>

  <!-- Party Performance: Seat Tally + Vote Share (toggled) -->
  <div class="card" id="party-perf-card">
    <h2>
      <span>📊 Party Performance</span>
      <div class="toggle-group" id="perf-toggle">
        <button class="toggle-btn active" data-view="tally">Seat Tally</button>
        <button class="toggle-btn" data-view="share">Vote Share</button>
      </div>
    </h2>
    <div class="legend" id="perf-legend-tally" style="margin-bottom:12px;">
      <div class="legend-item">
        <div class="legend-swatch declared"></div>
        <span>Declared (Won)</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch leading"></div>
        <span>Leading</span>
      </div>
    </div>
    <div id="perf-chart-area-tally">
      <div class="chart-container">
        <canvas id="tally-chart"></canvas>
      </div>
      <div id="tally-party-legend" class="legend"></div>
    </div>
    <div id="perf-chart-area-share" style="visibility:hidden; position:absolute; top:0; left:0; right:0; width:100%;">
      <div class="chart-container">
        <canvas id="vote-share-chart"></canvas>
      </div>
      <div id="vote-share-legend" class="legend"></div>
    </div>
    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="icon">📭</div>
      <h3>No results yet</h3>
      <p>Results will appear here as counting progresses.</p>
    </div>
  </div>

  <div class="card" id="races-card">
    <h2>🏇 Votes by Candidate</h2>
    <div style="margin-bottom:12px;">
      <select id="race-select" size="1" style="
        background:#363636; color:#f0f0f0; border:1px solid #4a4a4a;
        border-radius:8px; padding:8px 12px; font-size:14px; min-width:280px;
        max-height:40vh; overflow-y:auto;
      "></select>
    </div>
    <div class="chart-container" id="races-chart-container" style="height:600px;">
      <canvas id="races-chart"></canvas>
    </div>
  </div>

  <div class="card" id="roundwise-card">
    <h2>📈 Roundwise Progression</h2>
    <p style="color:var(--muted); font-size:13px; margin-bottom:12px;">
      How seats accumulate as counting rounds complete
    </p>
    <div class="chart-container" style="height:400px;">
      <canvas id="roundwise-chart"></canvas>
    </div>
  </div>
</div>
<script>
// ---------------------------------------------------------------------------
// Config
// ---------------------------------------------------------------------------
const POLL_INTERVAL = 5000;

let currentState = '';
let currentMajority = null;
let chart = null;
let pollTimer = null;
let partyNames = {};
let partyDepositLoss = {};
let voteShareChart = null;
let racesChart = null;
let racesData = [];
let roundwiseChart = null;
let lastDataFingerprint = '';
let perfView = 'tally';  // 'tally' or 'share'
let perfParties = [];  // shared party list for both views

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
document.getElementById('date-display').textContent =
  new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

// Toggle between Seat Tally and Vote Share
document.getElementById('perf-toggle').addEventListener('click', (e) => {
  const btn = e.target.closest('.toggle-btn');
  if (!btn) return;
  const view = btn.dataset.view;
  if (view === perfView) return;
  perfView = view;
  document.querySelectorAll('#perf-toggle .toggle-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.view === view));
  const tallyArea = document.getElementById('perf-chart-area-tally');
  const shareArea = document.getElementById('perf-chart-area-share');
  const tallyLeg = document.getElementById('perf-legend-tally');
  if (view === 'tally') {
    tallyArea.style.cssText = '';
    tallyLeg.style.display = '';
    shareArea.style.cssText = 'visibility:hidden; position:absolute; top:0; left:0; right:0; width:100%;';
  } else {
    tallyArea.style.cssText = 'visibility:hidden; position:absolute; top:0; left:0; right:0; width:100%;';
    tallyLeg.style.display = 'none';
    shareArea.style.cssText = '';
  }
});

async function init() {
  const statusResp = await fetch('/api/status');
  const status = await statusResp.json();
  updateStatusBar(status);
  fetchData();
  pollTimer = setInterval(fetchData, POLL_INTERVAL);
}

// ---------------------------------------------------------------------------
// Data fetch
// ---------------------------------------------------------------------------
async function fetchData() {
  try {
    const url = currentState ? `/api/seat-tally?state=${currentState}` : '/api/seat-tally';
    const resp = await fetch(url);
    const data = await resp.json();

    const fp = JSON.stringify(data.parties);
    if (fp === lastDataFingerprint) {
      updateStatusDot(true);
      document.getElementById('status-text').textContent =
        `Updated ${new Date(data.updated_at).toLocaleTimeString('en-IN')}`;
      return;
    }
    lastDataFingerprint = fp;

    currentMajority = data.majority;
    renderChart(data.parties, data.majority);
    renderVoteShare();
    updateStatusDot(true);
    document.getElementById('status-text').textContent =
      `Updated ${new Date(data.updated_at).toLocaleTimeString('en-IN')}`;
  } catch (e) {
    updateStatusDot(false);
    console.error('Fetch failed:', e);
  }
}

async function fetchStatus() {
  try {
    const url = currentState ? `/api/status?state=${currentState}` : '/api/status';
    const resp = await fetch(url);
    const status = await resp.json();
    updateStatusBar(status);
  } catch (e) { /* ignore */ }
}

function loadStateCharts() {
  renderRaces(currentState);
  renderRoundwise(currentState);
}

// ---------------------------------------------------------------------------
// Render — Party Performance legend helper
// ---------------------------------------------------------------------------
function buildCircleLegend(el, labels, colors) {
  if (!el) return;
  el.innerHTML = labels.map((l, i) =>
    `<div class="legend-item">
      <div class="legend-swatch" style="border-color:${colors[i]};"></div>
      <span>${l}</span>
    </div>`
  ).join('');
}

// ---------------------------------------------------------------------------
// Render — Seat Tally
// ---------------------------------------------------------------------------
function renderChart(parties, majority) {
  const canvas = document.getElementById('tally-chart');
  const emptyEl = document.getElementById('empty-state');

  if (!parties || parties.length === 0) {
    canvas.style.display = 'none';
    emptyEl.style.display = 'block';
    return;
  }
  canvas.style.display = 'block';
  emptyEl.style.display = 'none';

  const TOP_N = 15;
  const active = parties.filter(p => p.total > 0);
  const sorted = active.sort((a, b) => b.total - a.total);
  const main = sorted.slice(0, TOP_N);
  const others = sorted.slice(TOP_N);

  if (others.length > 0) {
    main.push({
      party_abv: `Others (${others.length})`,
      won: others.reduce((s, p) => s + p.won, 0),
      leading: others.reduce((s, p) => s + p.leading, 0),
      total: others.reduce((s, p) => s + p.total, 0),
      total_votes: others.reduce((s, p) => s + (p.total_votes || 0), 0),
      color: '#888888',
    });
  }

  // Store for vote share view (same parties, same order)
  perfParties = main;

  const labels = main.map(p => p.party_abv);
  const wonData = main.map(p => p.won);
  const leadData = main.map(p => p.leading);
  const colors = main.map(p => p.color);

  // Circle-style legend (no y-axis labels)
  buildCircleLegend(document.getElementById('tally-party-legend'), labels, colors);

  main.forEach(p => {
    partyNames[p.party_abv] = p.party_name || p.party_abv;
    partyDepositLoss[p.party_abv] = {
      lost_no_deposit: p.lost_no_deposit || 0,
      lost_deposit: p.lost_deposit || 0,
    };
  });

  const ctx = canvas.getContext('2d');

  if (chart) {
    const dataMax = Math.max(...wonData, ...leadData);
    chart.options.scales.x.suggestedMax =
      (currentMajority != null && currentState !== '')
        ? Math.max(dataMax, currentMajority) + 2
        : dataMax + 2;
    chart.data.labels = labels;
    chart.data.datasets[0].data = wonData;
    chart.data.datasets[0].backgroundColor = colors;
    chart.data.datasets[1].data = leadData;
    chart.data.datasets[1].backgroundColor = colors.map(c => {
      const pat = ctx.createPattern(createStripeCanvas(c), 'repeat');
      return pat || c;
    });
    chart.update('none');
    return;
  }

  const majorityPlugin = {
    id: 'majorityLine',
    afterDraw(chart) {
      const maj = currentMajority;
      if (maj == null || currentState === '') return;
      const xScale = chart.scales.x;
      const yScale = chart.scales.y;
      const x = xScale.getPixelForValue(maj);
      const ctx = chart.ctx;
      ctx.save();
      ctx.beginPath();
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = '#f87171';
      ctx.lineWidth = 2;
      ctx.moveTo(x, yScale.top);
      ctx.lineTo(x, yScale.bottom);
      ctx.stroke();
      ctx.fillStyle = '#f87171';
      ctx.font = '12px -apple-system, system-ui, sans-serif';
      const label = `Majority (${maj})`;
      const labelY = yScale.bottom - 0.10 * (yScale.bottom - yScale.top);
      const x75 = xScale.left + 0.75 * (xScale.right - xScale.left);
      if (x < x75) {
        ctx.textAlign = 'left';
        ctx.fillText(label, x + 6, labelY);
      } else {
        ctx.textAlign = 'right';
        ctx.fillText(label, x - 6, labelY);
      }
      ctx.restore();
    }
  };

  const dataLabelsPlugin = {
    id: 'dataLabels',
    afterDraw(chart) {
      const ctx = chart.ctx;
      const xScale = chart.scales.x;
      ctx.save();
      ctx.font = '13px -apple-system, system-ui, sans-serif';
      ctx.fillStyle = '#f0f0f0';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      const meta = chart.getDatasetMeta(0);
      for (let i = 0; i < meta.data.length; i++) {
        const won = chart.data.datasets[0].data[i] || 0;
        const lead = chart.data.datasets[1].data[i] || 0;
        const total = won + lead;
        if (total > 0) {
          const bar = meta.data[i];
          const x = xScale.getPixelForValue(total) + 6;
          ctx.fillText(total, x, bar.y);
        }
      }
      ctx.restore();
    }
  };

  chart = new Chart(ctx, {
    type: 'bar',
    plugins: [majorityPlugin, dataLabelsPlugin],
    data: {
      labels,
      datasets: [
        {
          label: 'Won (Declared)',
          data: wonData,
          backgroundColor: colors,
          borderRadius: 4,
          borderSkipped: false,
        },
        {
          label: 'Leading',
          data: leadData,
          backgroundColor: colors.map(c => {
            const pat = ctx.createPattern(createStripeCanvas(c), 'repeat');
            return pat || c;
          }),
          borderRadius: 4,
          borderSkipped: false,
        },
      ],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 800, easing: 'easeInOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#2a2a2a',
          titleColor: '#f0f0f0',
          bodyColor: '#999999',
          borderColor: '#4a4a4a',
          borderWidth: 1,
          padding: 12,
          callbacks: {
            title: function(items) {
              if (!items.length) return '';
              const idx = items[0].dataIndex;
              const abv = items[0].chart.data.labels[idx];
              return partyNames[abv] || abv;
            },
            label: function(ctx) {
              const idx = ctx.dataIndex;
              const won = ctx.chart.data.datasets[0].data[idx];
              const lead = ctx.chart.data.datasets[1].data[idx];
              const parts = [];
              if (won > 0) parts.push(`Won: ${won}`);
              if (lead > 0) parts.push(`Leading: ${lead}`);
              const abv = ctx.chart.data.labels[idx];
              const dep = partyDepositLoss[abv] || {};
              if (dep.lost_no_deposit > 0) parts.push(`Lost (deposit safe): ${dep.lost_no_deposit}`);
              if (dep.lost_deposit > 0) parts.push(`Lost (deposit forfeited): ${dep.lost_deposit}`);
              return parts;
            }
          }
        },
      },
      layout: {
        padding: { left: 8, right: 50, bottom: 10 },
      },
      scales: {
        x: {
          stacked: true,
          suggestedMax: (majority && currentState !== '')
            ? Math.max(...wonData, ...leadData, majority) + 2
            : undefined,
          grid: { color: '#3a3a3a' },
          ticks: { color: '#999999', font: { size: 12 } },
          title: { display: true, text: 'Seats', color: '#999999' },
        },
        y: {
          stacked: true,
          grid: { display: false },
          ticks: { display: false },  // labels in legend, not on axis
        },
      },
    },
  });
}

function createStripeCanvas(color) {
  const c = document.createElement('canvas');
  c.width = 10; c.height = 10;
  const ctx = c.getContext('2d');
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, 10, 10);
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-2, 10); ctx.lineTo(10, -2);
  ctx.moveTo(4, 12); ctx.lineTo(12, 4);
  ctx.stroke();
  return c;
}

// ---------------------------------------------------------------------------
// Render — Vote Share (uses same parties as seat tally for smooth toggle)
// ---------------------------------------------------------------------------
function renderVoteShare() {
  if (!perfParties.length) return;

  // Use the SAME party list as seat tally (same order, same grouping)
  const grandTotal = perfParties.reduce((s, p) => s + (p.total_votes || 0), 0);
  if (grandTotal === 0) return;

  const labels = perfParties.map(p => p.party_abv);
  const data = perfParties.map(p => +((p.total_votes || 0) * 100 / grandTotal).toFixed(1));
  const colors = perfParties.map(p => p.color);

  // Circle-style legend
  buildCircleLegend(document.getElementById('vote-share-legend'), labels, colors);

  const canvas = document.getElementById('vote-share-chart');
  const ctx = canvas.getContext('2d');

  if (voteShareChart) {
    voteShareChart.data.labels = labels;
    voteShareChart.data.datasets[0].data = data;
    voteShareChart.data.datasets[0].backgroundColor = colors;
    voteShareChart.update('none');
    return;
  }

  voteShareChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderRadius: 4,
        borderSkipped: false,
      }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 800, easing: 'easeInOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#2a2a2a',
          titleColor: '#f0f0f0',
          bodyColor: '#999999',
          borderColor: '#4a4a4a',
          borderWidth: 1,
          padding: 12,
          callbacks: {
            title: function(items) {
              if (!items.length) return '';
              return partyNames[items[0].label] || items[0].label;
            },
            label: function(ctx) { return `${ctx.parsed.x}% of total votes`; }
          }
        },
      },
      layout: { padding: { left: 8, right: 60, bottom: 10 } },
      scales: {
        x: {
          grid: { color: '#3a3a3a' },
          ticks: { color: '#999999', font: { size: 12 }, callback: v => v + '%' },
          title: { display: true, text: 'Vote Share (%)', color: '#999999' },
          max: Math.max(...data) + 5,
        },
        y: {
          grid: { display: false },
          ticks: { display: false },  // labels in legend, not on axis
        },
      },
    },
    plugins: [{
      id: 'vsLabels',
      afterDraw(chart) {
        const xScale = chart.scales.x;
        const meta = chart.getDatasetMeta(0);
        const ctx = chart.ctx;
        ctx.save();
        ctx.font = '13px -apple-system, system-ui, sans-serif';
        ctx.fillStyle = '#f0f0f0';
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'left';
        for (let i = 0; i < meta.data.length; i++) {
          const val = chart.data.datasets[0].data[i];
          const x = xScale.getPixelForValue(val) + 6;
          ctx.fillText(val + '%', x, meta.data[i].y);
        }
        ctx.restore();
      }
    }],
  });
}

// ---------------------------------------------------------------------------
// AC Races chart — candidate names inside bars, left-aligned
// ---------------------------------------------------------------------------
function renderRaces(stateCode) {
  const card = document.getElementById('races-card');
  if (!stateCode) {
    card.style.display = 'none';
    if (racesChart) { racesChart.destroy(); racesChart = null; }
    racesData = [];
    return;
  }
  card.style.display = 'block';

  fetch(`/api/ac-races?state=${stateCode}`)
    .then(r => r.json())
    .then(data => {
      racesData = data.races || [];
      if (!racesData.length) { card.style.display = 'none'; return; }

      const alphaIndices = racesData.map((r, i) => i)
        .sort((a, b) => (racesData[a].ac_name || '').localeCompare(racesData[b].ac_name || ''));

      const sel = document.getElementById('race-select');
      const prevValue = sel.value;
      sel.innerHTML = '';
      alphaIndices.forEach(i => {
        const race = racesData[i];
        const opt = document.createElement('option');
        opt.value = i;
        const name = (race.ac_name || '').trim().toUpperCase();
        opt.textContent = `${name} (${race.ac_no})`;
        sel.appendChild(opt);
      });
      if (prevValue && sel.querySelector(`option[value="${prevValue}"]`)) {
        sel.value = prevValue;
      }
      sel.onchange = () => drawSingleRace(racesData[+sel.value]);
      drawSingleRace(racesData[+sel.value]);
    })
    .catch(e => { console.error('Failed to load races:', e); card.style.display = 'none'; });
}

function drawSingleRace(race) {
  const candidates = race.candidates || [];
  if (!candidates.length) return;

  let showCount = candidates.length;
  for (let i = 0; i < candidates.length; i++) {
    if (candidates[i].candidate === 'NOTA') { showCount = i + 1; break; }
  }
  const shown = candidates.slice(0, showCount);

  // Empty labels — names drawn inside bars by plugin
  const labels = shown.map(() => '');
  const votesData = shown.map(c => c.votes);
  const colors = shown.map(c => c.color);
  const maxVotes = votesData[0] || 1;

  const chartH = Math.max(180, shown.length * 36 + 60);
  document.getElementById('races-chart-container').style.height = chartH + 'px';

  const canvas = document.getElementById('races-chart');
  const ctx = canvas.getContext('2d');

  if (racesChart) {
    racesChart.data.datasets[0].data = votesData;
    racesChart.data.datasets[0].backgroundColor = colors;
    racesChart.options.scales.x.max = maxVotes * 1.18;
    racesChart.update('none');
    return;
  }

  racesChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: votesData,
        backgroundColor: colors,
        borderRadius: 4,
        borderSkipped: false,
        barPercentage: 0.7,
        categoryPercentage: 0.85,
      }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 600, easing: 'easeInOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#2a2a2a',
          titleColor: '#f0f0f0',
          bodyColor: '#999999',
          borderColor: '#4a4a4a',
          borderWidth: 1,
          padding: 12,
          callbacks: {
            title: function(items) {
              if (!items.length) return '';
              const c = shown[items[0].dataIndex];
              return `${c.candidate} (${c.party_abv})`;
            },
            label: function(ctx) {
              return `${ctx.parsed.x.toLocaleString()} votes`;
            }
          }
        },
      },
      layout: { padding: { left: 8, right: 80, bottom: 10 } },
      scales: {
        x: {
          max: maxVotes * 1.18,
          grid: { color: '#3a3a3a' },
          ticks: { color: '#999999', font: { size: 11 }, callback: v => (v / 1000).toFixed(0) + 'k' },
          title: { display: true, text: 'Votes', color: '#999999' },
        },
        y: {
          grid: { display: false },
          ticks: { display: false },  // names drawn inside bars by plugin
        },
      },
    },
    plugins: [{
      id: 'candidateLabels',
      afterDraw(chart) {
        const xScale = chart.scales.x;
        const meta = chart.getDatasetMeta(0);
        const ctx = chart.ctx;
        ctx.save();
        ctx.font = '12px -apple-system, system-ui, sans-serif';
        ctx.textBaseline = 'middle';
        for (let i = 0; i < meta.data.length; i++) {
          const bar = meta.data[i];
          const votes = votesData[i];
          const c = shown[i];
          const barW = xScale.getPixelForValue(votes) - xScale.getPixelForValue(0);
          const barX = xScale.getPixelForValue(0);
          ctx.fillStyle = barW > 160 ? '#ffffff' : '#f0f0f0';
          ctx.textAlign = 'left';
          const name = `${c.candidate} — ${votes.toLocaleString()}`;
          if (barW > 160) {
            ctx.fillText(name, barX + 8, bar.y);
          } else {
            ctx.fillStyle = '#f0f0f0';
            ctx.fillText(name, barX + barW + 6, bar.y);
          }
        }
        ctx.restore();
      }
    }],
  });
}

// ---------------------------------------------------------------------------
// Roundwise progression — smooth lines, no dots, circle legends
// ---------------------------------------------------------------------------
function renderRoundwise(stateCode) {
  const card = document.getElementById('roundwise-card');
  if (!stateCode) {
    card.style.display = 'none';
    if (roundwiseChart) { roundwiseChart.destroy(); roundwiseChart = null; }
    return;
  }
  card.style.display = 'block';

  fetch(`/api/roundwise?state=${stateCode}`)
    .then(r => r.json())
    .then(data => {
      const rounds = data.rounds || [];
      const series = data.series || [];
      if (!rounds.length || !series.length) { card.style.display = 'none'; return; }

      const canvas = document.getElementById('roundwise-chart');
      const ctx = canvas.getContext('2d');

      const datasets = series.map(s => ({
        label: s.party_abv,
        data: s.data,
        borderColor: s.color,
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 4,
        tension: 0.3,
        fill: false,
      }));

      if (roundwiseChart) {
        roundwiseChart.data.labels = rounds;
        roundwiseChart.data.datasets = datasets;
        roundwiseChart.update('none');
        return;
      }

      roundwiseChart = new Chart(ctx, {
        type: 'line',
        data: { labels: rounds, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 600, easing: 'easeInOutQuart' },
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              display: true,
              position: 'bottom',
              labels: {
                color: '#f0f0f0',
                font: { size: 12 },
                usePointStyle: true,
                pointStyle: 'circle',
                padding: 16,
              },
            },
            tooltip: {
              backgroundColor: '#2a2a2a',
              titleColor: '#f0f0f0',
              bodyColor: '#999999',
              borderColor: '#4a4a4a',
              borderWidth: 1,
              padding: 12,
              callbacks: {
                title: function(items) { return `Round ${items[0].label}`; },
                label: function(ctx) {
                  return `${ctx.dataset.label}: ${ctx.parsed.y} seats`;
                }
              }
            },
          },
          scales: {
            x: {
              grid: { color: '#3a3a3a' },
              ticks: { color: '#999999', font: { size: 11 } },
              title: { display: true, text: 'Round', color: '#999999' },
            },
            y: {
              grid: { color: '#3a3a3a' },
              ticks: { color: '#999999', font: { size: 11 } },
              title: { display: true, text: 'Seats', color: '#999999' },
              beginAtZero: true,
            },
          },
        },
      });
    })
    .catch(e => { console.error('Failed to load roundwise:', e); card.style.display = 'none'; });
}

// ---------------------------------------------------------------------------
// Status helpers
// ---------------------------------------------------------------------------
function updateStatusDot(live) {
  const dot = document.getElementById('status-dot');
  dot.className = live ? 'status-dot live' : 'status-dot idle';
}

function updateStatusBar(status) {
  const bar = document.getElementById('status-bar');
  const s = status.statuses || {};
  const done = s.DONE || 0;
  const live = s.LIVE || 0;
  const pending = s.PENDING || 0;
  const errors = s.ERROR || 0;

  bar.innerHTML = `
    <span>
      <span class="declared-count">${done}</span> declared &nbsp;|&nbsp;
      <span class="live-count">${live}</span> counting &nbsp;|&nbsp;
      ${pending} pending
      ${errors > 0 ? `&nbsp;|&nbsp; <span style="color:var(--red)">${errors} errors</span>` : ''}
    </span>
  `;
}

// ---------------------------------------------------------------------------
// State selector
// ---------------------------------------------------------------------------
function renderStateBar(states) {
  const bar = document.getElementById('state-bar');
  bar.innerHTML = '';
  states.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'state-btn' + (s.code === currentState ? ' active' : '');
    btn.textContent = s.name;
    btn.onclick = () => {
      currentState = s.code;
      lastDataFingerprint = '';
      renderStateBar(states);
      fetchData();
      fetchStatus();
      loadStateCharts();
    };
    bar.appendChild(btn);
  });
}

async function discoverStates() {
  try {
    await fetch('/api/seat-tally');
    const states = [
      { code: '', name: 'Overall' },
      { code: 'S03', name: 'Assam' },
      { code: 'S11', name: 'Kerala' },
      { code: 'U07', name: 'Puducherry' },
      { code: 'S22', name: 'Tamil Nadu' },
      { code: 'S25', name: 'West Bengal' },
    ];
    renderStateBar(states);
  } catch (e) {
    renderStateBar([{ code: '', name: 'Overall' }]);
  }
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
discoverStates();
init();
setInterval(fetchStatus, 10000);
</script>
